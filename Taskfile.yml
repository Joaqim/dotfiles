# https://taskfile.dev

version: '3'

silent: false

tasks:
  default:
    deps:
      - help

  nixos:
    aliases:
      - switch
      - apply-nixos
    desc: Enable NixOS config for current device
    sources:
      - 'flake.nix'
      - 'flake.lock'
      - '.env'
      - 'apps/**/*'
      - 'flake/*'
      - 'hosts/**/*'
      - 'lib/*'
      - 'modules/nixos/**/*'
      - 'overlays/**/*'
      - 'pkgs/**/*'
      - 'secrets/**/*'
    cmds: 
      - |-
        [ -f "/etc/NIXOS" ] && nixos-rebuild switch --sudo --flake . --show-trace # --no-reexec 

  home-manager:
    aliases: 
      - hm
    desc: Enable home-manager config for current user and device
    sources:
      - 'flake.nix'
      - 'flake.lock'
      - '.env'
      - 'flake/*'
      - 'hosts/homes/**/*'
      - 'modules/home/**/*'
      - 'modules/nixos/home/**/*'
      - 'overlays/**/*'
      - 'pkgs/**/*'
      - 'secrets/**/*'
    cmds:
      # Using 'HM_HOST_SLUG=' in '.env' allows for building for specific host on any machine
      - nix run .#home-manager -- switch -b backup --show-trace --flake ".#${USER}@${HM_HOST_SLUG:-$(hostname)}"

  apply:
    desc: Enable NixOS and home-manager configuration for current user and device
    cmds: 
      - task: nixos
      # Force home-manager switch, since previous task might remove current home-manager configuration
      - task -f home-manager

  test-nixos:
    desc: Try to build NixOS config for current user and device
    aliases:
      - nixos-dry-run
    sources:
      - 'flake.nix'
      - 'flake.lock'
      - '.env'
      - 'apps/**/*'
      - 'flake/*'
      - 'hosts/**/*'
      - 'lib/*'
      - 'modules/nixos/**/*'
      - 'overlays/**/*'
      - 'pkgs/**/*'
      - 'secrets/**/*'
    cmds:
      # Prefer `build` rather than `test` and `dry-reactivate` for the speed and not requiring root permissions
      - nixos-rebuild build --flake . --show-trace

  test-home-manager:
    aliases:
      - home-manager-dry-run
      - hm-dry-run
      - test-hm
    desc: Dry activate home-manager config for current user and device
    sources:
      - 'flake.nix'
      - 'flake.lock'
      - '.env'
      - 'flake/*'
      - 'hosts/homes/**/*'
      - 'modules/home/**/*'
      - 'modules/nixos/home/**/*'
      - 'overlays/**/*'
      - 'pkgs/**/*'
      - 'secrets/**/*'
    cmds:
      # Using 'HM_HOST_SLUG=' in '.env' allows for building for specific host on any machine
      - nix run .#home-manager -- switch --dry-run -b backup --show-trace --flake ".#${USER}@${HM_HOST_SLUG:-$(hostname)}"
  
  test:
    aliases: 
      - dry-activate
    desc: Make sure NixOS and/or home-manager will work for current user and device
    cmds:
      - task: test-nixos
      - task: test-home-manager

  ci-home:
    desc: Make sure home-manager will work for generic user and devices
    cmds:
      - nix run .#home-manager -- switch -b backup --flake '.#github-actions@generic'

  home-manager-news:
    aliases: 
      - news
    desc: Show home-manager news
    cmds:
      - nix run .#home-manager -- news --flake ".#${USER}@${HM_HOST_SLUG:-$(hostname)}"

  check:
    desc: Check flake for errors
    cmds:
      - nix flake check -L

  update:
    desc: Bump dependencies
    cmds:
      - nix run .#commit-flake-lock
      - nix run .#commit-selfup
      - nix run .#commit-nvfetcher -L

  pre-commit-all:
    desc: Run pre-commit hooks on all files, including autoformatting
    cmds:
      - pre-commit run --all-files

  format:
    desc: Auto-format staged files and re-stage them (run before commit)
    cmds:
      - |
        # Get list of staged Nix files
        STAGED_FILES=$(git diff --cached --name-only --diff-filter=ACM | grep '\.nix$' || true)

        if [ -n "$STAGED_FILES" ]; then
          echo "Formatting staged Nix files..."

          # Run nixfmt on staged files
          echo "$STAGED_FILES" | xargs nixfmt 2>/dev/null || true

          # Run statix fix on staged files
          echo "$STAGED_FILES" | xargs statix fix 2>/dev/null || true

          # Re-stage the formatted files
          echo "$STAGED_FILES" | xargs git add

          echo "✓ Formatted and re-staged files"
        else
          echo "No staged Nix files to format"
        fi

  commit:
    desc: Smart commit - auto-formats, retries on linting failures
    cmds:
      - |
        set +e  # Don't exit on error
        MAX_ATTEMPTS=3
        ATTEMPT=1

        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "Commit attempt $ATTEMPT/$MAX_ATTEMPTS..."

          # Try to commit
          git commit "$@"
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✓ Commit successful!"
            exit 0
          fi

          # Check if it was a formatting failure
          if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
            echo "Pre-commit hooks modified files. Auto-formatting and retrying..."

            # Get modified files and re-stage them
            MODIFIED_FILES=$(git diff --name-only | grep '\.nix$' || true)
            if [ -n "$MODIFIED_FILES" ]; then
              echo "$MODIFIED_FILES" | xargs git add
              echo "Re-staged formatted files"
            fi

            ATTEMPT=$((ATTEMPT + 1))
          else
            echo "❌ Commit failed after $MAX_ATTEMPTS attempts"
            exit $EXIT_CODE
          fi
        done

  test-incremental:
    aliases:
      - test-inc
      - inc
    desc: Incrementally test only changed flake outputs (faster)
    cmds:
      - nix run path:.#test-changes -- test --eval-only

  test-changes:
    desc: Analyze which outputs are affected by current changes
    cmds:
      - nix run path:.#test-changes -- analyze

  help:
    desc: List available tasks
    cmds:
      - task --list-all
