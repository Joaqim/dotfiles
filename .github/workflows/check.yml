# Adapted from [1]:
# [1]: https://github.com/kachick/dotfiles/blob/main/.github/workflows/ci-home.yml
# [2]: https://github.com/NixOS/nixos-artwork/blob/35ebbbf01c3119005ed180726c388a01d4d1100c/logo/README.md#L5
name: ❄️ # [2]
on: 
  push:
    paths:
      - '.github/workflows/check.yml'
      - '**.nix'
      - 'flake.lock'

jobs:
  check:
    name: Run flake checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: 'true'
      - name: Move to dotfiles directory
        run: |
          # checkout seems to put us in submodules git directory
          # let's hard-code path to dotfiles directory for now
          cd /home/runner/work/dotfiles/dotfiles/
      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          send-statistics: false
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          logger: pretty
          diagnostic-endpoint: ""
      - name: Inspect flake outputs
        run: |
          flake="$(nix flake show . --json --legacy 2>/dev/null)"
          
          jq -r '
              "Available packages:", ((.packages."x86_64-linux" // {}) | to_entries[] | "  \(.key) # \(.value.description)"),
              "\nAvailable overlays:", (.overlays | keys[] | "  \(.)"),
              "\nAvailable apps:", ((.apps."x86_64-linux" // {}) | keys[] | "  \(.)")
          ' <<< "$flake" || { echo "Warning: could not parse flake output" ; jq <<< "$flake"; }
      - run: nix flake check
