name: '[Reusable] Nix Flake Check'
on:
  workflow_call:


jobs:
  check:
    name: Run flake check
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          submodules: 'true'
      - name: Check Nix flake inputs
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          send-statistics: false
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          logger: pretty
          diagnostic-endpoint: ""
      - name: Inspect flake outputs
        run: |
          flake="$(nix flake show . --json 2>/dev/null)" || { echo "Warning: nix flake show failed"; exit 0; }
          jq -r '
              "Available packages:",(.packages."x86_64-linux"? // {} | to_entries[] | "\t\(.key)   - \(.value.shortDescription // "")"),
              "\nAvailable overlays:",(.overlays? // {} | keys[] | "\t\(.)"),
              "\nAvailable apps:",(.apps."x86_64-linux"? // {} | keys[] | "\t\(.)")
          ' <<< "$flake" 2>/dev/null || { echo "Warning: could not parse flake output for display"; exit 0; }
      - run: nix flake check
